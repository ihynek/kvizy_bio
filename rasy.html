<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Řasy</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const EMAILJS_CONFIG = {
            publicKey: "3b0esMCXl9fZX1QHi",
            serviceId: "service_t5uuqhn",
            templateId: "template_3retggz"
        };
        if (typeof emailjs !== "undefined") emailjs.init(EMAILJS_CONFIG.publicKey);

        const MuscleQuiz = () => {
            const QUIZ_CONFIG = {
                title: "Řasy",
                teacherEmail: "hynek@gymberoun.cz",
                timePerQuestion: 25,
                questions: [
                    { id:1, type:"boolean", question:"Řasy jsou polyfyletická skupina – různé skupiny řas vznikly ve více nezávislých vývojových liniích.", correct:true },
                    { id:2, type:"boolean", question:"Chloroplasty červených řas vznikly sekundární endosymbiózou ze zelených řas.", correct:false },
                    { id:3, type:"boolean", question:"Krásnoočka (Euglenophyta) patří do superskupiny Excavata, nikoli do Archaeplastida.", correct:true },
                    { id:4, type:"boolean", question:"Pyrenoidy jsou bílkovinná tělíska v chloroplastech, která slouží jako centrum syntézy škrobu.", correct:true },
                    { id:5, type:"boolean", question:"Červené řasy mají bičíkaté stadium – jejich gamety se pohybují pomocí bičíků.", correct:false },
                    { id:6, type:"multiple", question:"Jak se nazývá tělo řas, které není diferencované na kořen, stonek a list?", options:["Kormus","Thallus (stélka)","Rhizom","Sporofyt"], correct:1 },
                    { id:7, type:"multiple", question:"Který chlorofyl je přítomen ve VŠECH skupinách řas?", options:["Chlorofyl b","Chlorofyl c","Chlorofyl a","Chlorofyl d"], correct:2 },
                    { id:8, type:"multiple", question:"Do které superskupiny patří zelené řasy i červené řasy?", options:["SAR – Stramenopila","Excavata","Opisthokonta","Archaeplastida"], correct:3 },
                    { id:9, type:"multiple", question:"Jaká zásobní látka je typická výhradně pro krásnoočka (Euglenophyta)?", options:["Škrob","Glykogen","Paramylon","Inulin"], correct:2 },
                    { id:10, type:"multiple", question:"Jaký způsob pohlavního rozmnožování je typický pro šroubatku (Spirogyra)?", options:["Oogamie","Zoosporogonie","Konjugace (spájení)","Fragmentace stélky"], correct:2 },
                    { id:11, type:"multiple", question:"Která skupina řas dosahuje délky stélek až 70 m a je zdrojem alginátů?", options:["Červené řasy (Rhodophyta)","Zelené řasy (Chlorophyta)","Rozsivky (Bacillariophyceae)","Hnědé řasy / Chaluhy (Phaeophyceae)"], correct:3 },
                    { id:12, type:"multiple", question:"Co je frustul u rozsivek?", options:["Typ bičíku pro pohyb ve vodě","Dvoudílná křemičitá schránka ze SiO₂","Zásobní organela s chrysolaminarem","Světločivná skvrna reagující na světlo"], correct:1 },
                    { id:13, type:"multiple", question:"Z fosilních schránek rozsivek vzniká usazená hornina:", options:["Vápenec","Křemelina (diatomit)","Granit","Rula"], correct:1 },
                    { id:14, type:"multiple", question:"Chara (parožnatka) patří systematicky do skupiny:", options:["Červené řasy (Archaeplastida)","Hnědé řasy (SAR – Stramenopila)","Zelené řasy (Archaeplastida)","Krásnoočka (Excavata)"], correct:2 },
                    { id:15, type:"multiple", question:"Jaký vývojový stupeň stélky má Euglena viridis (krásnoočko zelené)?", options:["Kokální","Vláknitý (trichální)","Pletivný","Bičíkatý (monadoidní)"], correct:3 },
                    { id:16, type:"multiple", question:"Co je mixotrofie u krásnoočka?", options:["Rozmnožování pomocí dvou různých buněk","Schopnost střídání autotrofní a heterotrofní výživy","Pohyb pomocí dvou různých bičíků","Vznik chloroplastů ze dvou endosymbioz"], correct:1 },
                    { id:17, type:"multiple", question:"Jaký vývojový stupeň stélky mají rozsivky?", options:["Pletivný","Bičíkatý (monadoidní)","Vláknitý (trichální)","Kokální (jednobuněčná bez bičíku)"], correct:3 },
                    { id:18, type:"multiple", question:"Gelidium je mořská červená řasa. Jaká látka se z ní průmyslově získává?", options:["Alginát","Agar","Paramylon","Fukoxantin"], correct:1 },
                    { id:19, type:"multiple", question:"Porphyra (v japonské kuchyni označovaná jako nori) patří mezi:", options:["Zelené řasy","Hnědé řasy","Červené řasy","Krásnoočka"], correct:2 },
                    { id:20, type:"multiple", question:"Sargassum je hnědá řasa tvořící obrovskou volně plovoucí biomasu v Atlantiku. Jak se toto moře jmenuje?", options:["Středozemní moře","Sargasové moře","Karibské moře","Arabské moře"], correct:1 },
                    { id:21, type:"multiple", question:"Co je stigma (světločivná skvrna) u krásnoočka?", options:["Zásobní granule s paramylonem","Organela pro vylučování (pulzující vakuola)","Fotoreceptor reagující na světlo","Část bičíku zajišťující pohyb"], correct:2 },
                    { id:22, type:"multiple", question:"Cladophora glomerata (žabí vlas) je příkladem jakého vývojového stupně stélky?", options:["Kokálního","Bičíkatého (monadoidního)","Sifonokladálního (vícejaderné buňky)","Pletivného"], correct:2 },
                    { id:23, type:"multiple", question:"Kam patří hnědé řasy (chaluhy) v moderním systému eukaryot?", options:["Archaeplastida","Excavata","Opisthokonta","SAR – Stramenopila"], correct:3 },
                    { id:24, type:"multiple", question:"Primární endosymbiózou (pohlcením sinice) vznikly chloroplasty skupiny:", options:["Excavata (krásnoočka)","SAR – Stramenopila (hnědé řasy, rozsivky)","Archaeplastida (zelené a červené řasy)","Opisthokonta (houby, živočichové)"], correct:2 },
                    { id:25, type:"multiple", question:"Šroubatka (Spirogyra) je vláknitá sladkovodní řasa s charakteristickými chloroplasty. Jak jsou tyto chloroplasty tvarované?", options:["Hvězdicovité","Miskovité","Šroubovitě stočené páskovité","Čočkovité"], correct:2 },
                    { id:26, type:"checkbox", question:"Která tvrzení o zelených řasách (Chlorophyta / Streptophyta) jsou správná?", options:["Zásobní látkou je škrob ukládaný v chloroplastech u pyrenoidu.","Patří do superskupiny Archaeplastida.","Mají výhradně bičíkatý vývojový stupeň stélky.","Parožnatky (Charophyceae) jsou nejbližšími žijícími příbuznými vyšších rostlin."], correct:[0,1,3] },
                    { id:27, type:"checkbox", question:"Která tvrzení o červených řasách (Rhodophyta) jsou správná?", options:["Jsou jediné řasy schopné fotosyntézy ve velkých mořských hloubkách (až 200 m).","Nemají bičíkaté stadium – buňky jsou vždy bez bičíku.","Patří do superskupiny SAR – Stramenopila.","Fykoerytrin a fykocyan překrývají chlorofyl a způsobují jejich červené zbarvení."], correct:[0,1,3] },
                    { id:28, type:"checkbox", question:"Která tvrzení o Euglena viridis (krásnoočko zelené) jsou správná?", options:["Je mixotrofní – na světle fotosyntezuje, ve tmě přijímá organické látky.","Má stigma (světločivnou skvrnu) a pulzující vakuolu.","Patří do superskupiny Archaeplastida.","Zásobní látkou je paramylon."], correct:[0,1,3] },
                    { id:29, type:"checkbox", question:"Která tvrzení o rozsivkách (Bacillariophyceae) jsou správná?", options:["Mají dvoudílnou křemičitou schránku (frustul) ze SiO₂.","Patří do superskupiny SAR – Stramenopila.","Jsou typicky pohyblivé pomocí bičíků – mají bičíkatý stupeň stélky.","Z fosilních schránek vzniká křemelina (diatomit) využívaná jako filtrační materiál."], correct:[0,1,3] },
                    { id:30, type:"checkbox", question:"Která tvrzení o endosymbióze jsou správná?", options:["Primární endosymbiózou vznikly chloroplasty zelených a červených řas pohlcením sinice.","Krásnoočka získala chloroplasty sekundární endosymbiózou ze zelených řas.","Všechny skupiny řas získaly chloroplasty stejnou cestou – primární endosymbiózou.","Hnědé řasy a rozsivky získaly chloroplasty sekundární endosymbiózou z ruduch."], correct:[0,1,3] }
                ]
            };

            const shuffleArray = (arr) => {
                const a = [...arr];
                for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
                return a;
            };

            const [questions] = useState(() => shuffleArray(QUIZ_CONFIG.questions).map(q => {
                if (q.type === "multiple") {
                    const wi = q.options.map((t,i) => ({t,i}));
                    const sh = shuffleArray(wi);
                    return { ...q, options: sh.map(x=>x.t), correct: sh.findIndex(x=>x.i===q.correct) };
                }
                return q;
            }));

            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [answers, setAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);
            const [studentFirstName, setStudentFirstName] = useState("");
            const [studentLastName, setStudentLastName] = useState("");
            const [isSending, setIsSending] = useState(false);
            const [emailSent, setEmailSent] = useState(false);
            const [quizCompleted, setQuizCompleted] = useState(false);
            const totalTimeLimit = QUIZ_CONFIG.timePerQuestion * questions.length;
            const [timeLeft, setTimeLeft] = useState(totalTimeLimit);
            const [startTime] = useState(Date.now());
            const timeExpiredRef = useRef(false);
            const [windowSwitches, setWindowSwitches] = useState(0);

            useEffect(() => {
                if (showResults || quizCompleted) return;
                const t = setInterval(() => {
                    const rem = totalTimeLimit - Math.floor((Date.now()-startTime)/1000);
                    if (rem <= 0 && !timeExpiredRef.current) { timeExpiredRef.current=true; setTimeLeft(0); setShowResults(true); }
                    else setTimeLeft(Math.max(0,rem));
                }, 1000);
                return () => clearInterval(t);
            }, [startTime, totalTimeLimit, showResults, quizCompleted]);

            useEffect(() => {
                if (showResults || quizCompleted) return;
                const onHide = () => { if (document.hidden) setWindowSwitches(p=>p+1); };
                const onBlur = () => setWindowSwitches(p=>p+1);
                document.addEventListener("visibilitychange", onHide);
                window.addEventListener("blur", onBlur);
                return () => { document.removeEventListener("visibilitychange", onHide); window.removeEventListener("blur", onBlur); };
            }, [showResults, quizCompleted]);

            useEffect(() => {
                const f = e => e.preventDefault();
                document.addEventListener("copy",f); document.addEventListener("cut",f); document.addEventListener("contextmenu",f);
                return () => { document.removeEventListener("copy",f); document.removeEventListener("cut",f); document.removeEventListener("contextmenu",f); };
            }, []);

            useEffect(() => {
                if (localStorage.getItem(`quiz_completed_${QUIZ_CONFIG.title}`)) setQuizCompleted(true);
            }, []);

            const fmt = s => `${Math.floor(s/60)} minut ${s%60} sekund`;
            const getElapsed = () => Math.min(Math.floor((Date.now()-startTime)/1000), totalTimeLimit);
            const arrEq = (a,b) => Array.isArray(a)&&Array.isArray(b) && [...a].sort((x,y)=>x-y).join()===([...b].sort((x,y)=>x-y)).join();
            const isOk = (q,a) => q.type==="checkbox" ? arrEq(a,q.correct) : a===q.correct;
            const calcScore = () => questions.reduce((s,q,i) => answers[i]!==undefined && isOk(q,answers[i]) ? s+1 : s, 0);

            const handleAnswer = (val) => {
                const q = questions[currentQuestion];
                if (q.type==="checkbox") {
                    const cur = answers[currentQuestion]||[];
                    setAnswers({...answers, [currentQuestion]: cur.includes(val) ? cur.filter(x=>x!==val) : [...cur,val]});
                } else {
                    setAnswers({...answers, [currentQuestion]: val});
                }
            };

            const handleNext = () => currentQuestion < questions.length-1 ? setCurrentQuestion(currentQuestion+1) : setShowResults(true);
            const handlePrev = () => currentQuestion > 0 && setCurrentQuestion(currentQuestion-1);

            const q = questions[currentQuestion];
            const isAnswered = q.type==="checkbox" ? (answers[currentQuestion]||[]).length>0 : answers[currentQuestion]!==undefined;

            const sendEmail = async () => {
                if (!studentFirstName.trim()||!studentLastName.trim()) { alert("Prosím vyplň své jméno i příjmení."); return; }
                setIsSending(true);
                const score=calcScore(), pct=(score/questions.length*100).toFixed(1);
                const grade = pct<29?5:pct<=49?4:pct<=79?3:pct<=89?2:1;
                const fullName=`${studentFirstName} ${studentLastName}`, timeSpent=fmt(getElapsed());
                localStorage.setItem(`quiz_completed_${QUIZ_CONFIG.title}`, JSON.stringify({name:fullName,date:new Date().toISOString(),score:`${score}/${questions.length}`,time:timeSpent,windowSwitches}));
                let det="";
                questions.forEach((q,i)=>{
                    const a=answers[i], ok=isOk(q,a);
                    det+=`${i+1}. ${q.question}\n`;
                    if(q.type==="multiple") det+=`   Odpověď: ${a!==undefined?q.options[a]:"Bez odpovědi"}\n   Správně: ${q.options[q.correct]}\n`;
                    else if(q.type==="boolean") det+=`   Odpověď: ${a!==undefined?(a?"Pravda":"Nepravda"):"Bez odpovědi"}\n   Správně: ${q.correct?"Pravda":"Nepravda"}\n`;
                    else if(q.type==="checkbox"){
                        const sel=Array.isArray(a)&&a.length>0?[...a].sort((x,y)=>x-y).map(j=>q.options[j]).join(", "):"Bez odpovědi";
                        det+=`   Odpověď: ${sel}\n   Správně: ${q.correct.map(j=>q.options[j]).join(", ")}\n`;
                    }
                    det+=`   Výsledek: ${ok?"✓ Správně":"✗ Špatně"}\n\n`;
                });
                try {
                    await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {to_email:QUIZ_CONFIG.teacherEmail,student_name:fullName,quiz_title:QUIZ_CONFIG.title,score:`${score}/${questions.length}`,percentage:`${pct}%`,grade,date:new Date().toLocaleDateString("cs-CZ"),time:timeSpent,window_switches:windowSwitches,answers_details:det});
                    setEmailSent(true);
                    alert("✓ Výsledky byly úspěšně odeslány učiteli!");
                } catch(e) { console.error(e); alert("Nepodařilo se odeslat e-mail. Zkus to prosím znovu."); }
                finally { setIsSending(false); }
            };

            if (quizCompleted) {
                const d=JSON.parse(localStorage.getItem(`quiz_completed_${QUIZ_CONFIG.title}`)||"{}");
                return (<div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                    <div className="max-w-2xl mx-auto bg-white rounded-lg shadow-xl p-8 text-center">
                        <div className="text-6xl mb-4">🔒</div>
                        <h1 className="text-3xl font-bold text-indigo-900 mb-4">Kvíz již byl vyplněn</h1>
                        <p className="text-gray-700 text-lg mb-6">Tento kvíz jsi již dokončil a odeslal učiteli.</p>
                        {d.name && <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-6 mb-6 text-left">
                            <p className="text-gray-700 mb-2"><strong>Jméno:</strong> {d.name}</p>
                            <p className="text-gray-700 mb-2"><strong>Výsledek:</strong> {d.score}</p>
                            {d.time && <p className="text-gray-700 mb-2"><strong>Čas:</strong> {d.time}</p>}
                            {d.windowSwitches>0 && <p className="text-gray-700 mb-2"><strong>Přepnutí oken:</strong> {d.windowSwitches}×</p>}
                            <p className="text-gray-700"><strong>Datum:</strong> {new Date(d.date).toLocaleString("cs-CZ")}</p>
                        </div>}
                        <p className="text-gray-600 text-sm">Každý student může kvíz vyplnit pouze jednou.</p>
                    </div>
                </div>);
            }

            if (showResults) {
                const score=calcScore(), pct=(score/questions.length*100).toFixed(1), timeSpent=fmt(getElapsed()), expired=timeExpiredRef.current;
                return (<div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                    <div className="max-w-3xl mx-auto bg-white rounded-lg shadow-xl p-8">
                        <h1 className="text-3xl font-bold text-center text-indigo-900 mb-6">Výsledky kvízu</h1>
                        <div className={`border-2 rounded-lg p-4 mb-4 text-center ${expired?"bg-red-100 border-red-400":"bg-blue-100 border-blue-400"}`}>
                            <div className={`text-2xl font-bold ${expired?"text-red-800":"text-blue-800"}`}>{expired?"⏰ Čas vypršel!":`⏱️ Čas: ${timeSpent}`}</div>
                        </div>
                        {windowSwitches>0 && <div className="bg-orange-50 border-2 border-orange-400 rounded-lg p-4 mb-6 text-center">
                            <div className="text-xl font-bold text-orange-800">⚠️ Přepnutí oken: {windowSwitches}×</div>
                            <p className="text-orange-700 text-sm mt-2">Tato informace bude odeslána učiteli.</p>
                        </div>}
                        <div className="text-center mb-8">
                            <div className="text-6xl font-bold text-indigo-600 mb-2">{score} / {questions.length}</div>
                            <div className="text-2xl text-gray-700">{pct}%</div>
                            <div className="mt-4 text-lg font-semibold">
                                {pct<29?<span className="text-red-600">Hodnocení: 5</span>:pct<=49?<span className="text-orange-600">Hodnocení: 4</span>:pct<=79?<span className="text-yellow-600">Hodnocení: 3</span>:pct<=89?<span className="text-blue-600">Hodnocení: 2</span>:<span className="text-green-600">Hodnocení: 1</span>}
                            </div>
                        </div>
                        {!emailSent && <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-6 mb-6">
                            <h2 className="text-lg font-bold text-gray-800 mb-3">📧 Odeslat výsledky učiteli</h2>
                            <div className="grid grid-cols-2 gap-3 mb-3">
                                <input type="text" placeholder="Jméno" value={studentFirstName} onChange={e=>setStudentFirstName(e.target.value)} disabled={isSending} className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none disabled:bg-gray-100" />
                                <input type="text" placeholder="Příjmení" value={studentLastName} onChange={e=>setStudentLastName(e.target.value)} disabled={isSending} className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none disabled:bg-gray-100" />
                            </div>
                            <button onClick={sendEmail} disabled={isSending} className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed">{isSending?"Odesílám...":"Odeslat výsledky učiteli"}</button>
                        </div>}
                        {emailSent && <div className="bg-green-50 border-2 border-green-300 rounded-lg p-6 mb-6 text-center">
                            <div className="text-4xl mb-2">✓</div>
                            <p className="text-green-800 font-semibold text-lg">Výsledky odeslány učiteli!</p>
                            <p className="text-gray-800 font-bold text-2xl mt-4">Nyní můžeš zavřít prohlížeč.</p>
                        </div>}
                        <div className="space-y-4">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">Přehled odpovědí:</h2>
                            {questions.map((q,i) => {
                                const a=answers[i], ok=isOk(q,a);
                                return (<div key={q.id} className={`p-4 rounded-lg border-2 ${ok?"bg-green-50 border-green-300":"bg-red-50 border-red-300"}`}>
                                    <div className="flex items-start gap-2">
                                        <span className="font-bold text-gray-700">{i+1}.</span>
                                        <div className="flex-1">
                                            <p className="text-gray-800 mb-2">{q.question}</p>
                                            {q.type==="multiple" && <>
                                                <p className="text-sm text-gray-600">Tvá odpověď: <span className={ok?"text-green-700 font-semibold":"text-red-700 font-semibold"}>{a!==undefined?q.options[a]:"Bez odpovědi"}</span></p>
                                                {!ok && <p className="text-sm text-green-700 font-semibold">Správná odpověď: {q.options[q.correct]}</p>}
                                            </>}
                                            {q.type==="boolean" && <>
                                                <p className="text-sm text-gray-600">Tvá odpověď: <span className={ok?"text-green-700 font-semibold":"text-red-700 font-semibold"}>{a!==undefined?(a?"Pravda":"Nepravda"):"Bez odpovědi"}</span></p>
                                                {!ok && <p className="text-sm text-green-700 font-semibold">Správná odpověď: {q.correct?"Pravda":"Nepravda"}</p>}
                                            </>}
                                            {q.type==="checkbox" && <>
                                                <p className="text-sm text-gray-600 mb-1">Tvá odpověď:</p>
                                                <ul className="text-sm space-y-0.5">
                                                    {q.options.map((opt,idx) => {
                                                        const sel=Array.isArray(a)&&a.includes(idx), isCorr=q.correct.includes(idx);
                                                        const col=sel&&isCorr?"text-green-700":sel&&!isCorr?"text-red-600":!sel&&isCorr?"text-orange-600":"text-gray-400";
                                                        return <li key={idx} className={`font-medium ${col}`}>{sel?"☑":"☐"} {opt}{!sel&&isCorr?" ← chybělo":""}</li>;
                                                    })}
                                                </ul>
                                            </>}
                                        </div>
                                        <span className="text-2xl">{ok?"✓":"✗"}</span>
                                    </div>
                                </div>);
                            })}
                        </div>
                    </div>
                </div>);
            }

            const isTimeCritical=timeLeft<=120, isTimeVeryLow=timeLeft<=60;
            const timerColor=isTimeVeryLow?"bg-red-100 border-red-500":isTimeCritical?"bg-orange-100 border-orange-400":"bg-blue-100 border-blue-400";
            const timerTextColor=isTimeVeryLow?"text-red-800":isTimeCritical?"text-orange-800":"text-blue-800";

            return (<div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                <div className="max-w-3xl mx-auto bg-white rounded-lg shadow-xl p-8">
                    <div className="mb-6">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-2xl font-bold text-indigo-900">Kvíz: {QUIZ_CONFIG.title}</h1>
                            <span className="text-gray-600 font-semibold">{currentQuestion+1} / {questions.length}</span>
                        </div>
                        <div className={`border-2 rounded-lg p-3 mb-4 text-center ${timerColor}`}>
                            <div className={`text-xl font-bold ${timerTextColor}`}>
                                {isTimeVeryLow?"🔴":isTimeCritical?"⚠️":"⏰"} Zbývající čas: {fmt(timeLeft)}
                            </div>
                            {isTimeCritical && <p className={`text-sm mt-1 ${timerTextColor}`}>{isTimeVeryLow?"Čas téměř vypršel!":"Pozor, zbývá málo času!"}</p>}
                        </div>
                        <div className="w-full bg-gray-200 rounded-full h-2">
                            <div className="bg-indigo-600 h-2 rounded-full transition-all duration-300" style={{width:`${((currentQuestion+1)/questions.length)*100}%`}} />
                        </div>
                    </div>
                    <div className="mb-8">
                        <h2 className="text-xl text-gray-800 mb-2 leading-relaxed">{q.question}</h2>
                        {q.type==="checkbox" && <p className="text-sm text-indigo-600 font-medium mb-4">☑ Může být více správných odpovědí – zatrhnout všechna správná tvrzení</p>}

                        {q.type==="multiple" && <div className="space-y-3">
                            {q.options.map((opt,idx) => (
                                <button key={idx} onClick={()=>handleAnswer(idx)}
                                    className={`w-full text-left p-4 rounded-lg border-2 transition ${answers[currentQuestion]===idx?"border-indigo-600 bg-indigo-50":"border-gray-300 hover:border-indigo-400 hover:bg-gray-50"}`}>
                                    <span className="font-semibold text-gray-700">{String.fromCharCode(65+idx)}.</span> {opt}
                                </button>
                            ))}
                        </div>}

                        {q.type==="boolean" && <div className="space-y-3">
                            {[true,false].map(val => (
                                <button key={String(val)} onClick={()=>handleAnswer(val)}
                                    className={`w-full text-left p-4 rounded-lg border-2 transition ${answers[currentQuestion]===val?"border-indigo-600 bg-indigo-50":"border-gray-300 hover:border-indigo-400 hover:bg-gray-50"}`}>
                                    <span className="font-semibold text-gray-700">{val?"Pravda":"Nepravda"}</span>
                                </button>
                            ))}
                        </div>}

                        {q.type==="checkbox" && <div className="space-y-3">
                            {q.options.map((opt,idx) => {
                                const sel=(answers[currentQuestion]||[]).includes(idx);
                                return (<button key={idx} onClick={()=>handleAnswer(idx)}
                                    className={`w-full text-left p-4 rounded-lg border-2 transition flex items-start gap-3 ${sel?"border-indigo-600 bg-indigo-50":"border-gray-300 hover:border-indigo-400 hover:bg-gray-50"}`}>
                                    <span className={`text-xl leading-tight flex-shrink-0 ${sel?"text-indigo-600":"text-gray-400"}`}>{sel?"☑":"☐"}</span>
                                    <span className="text-gray-800">{opt}</span>
                                </button>);
                            })}
                        </div>}
                    </div>
                    <div className="flex gap-4">
                        <button onClick={handlePrev} disabled={currentQuestion===0} className="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-400 transition disabled:opacity-50 disabled:cursor-not-allowed">← Zpět</button>
                        <button onClick={handleNext} disabled={!isAnswered} className="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                            {currentQuestion===questions.length-1?"Dokončit":"Další →"}
                        </button>
                    </div>
                    {!isAnswered && <p className="text-center text-gray-500 text-sm mt-4">{q.type==="checkbox"?"Pro pokračování vyber alespoň jednu možnost":"Pro pokračování vyber odpověď"}</p>}
                </div>
            </div>);
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<MuscleQuiz />);
    </script>
</body>
</html>
