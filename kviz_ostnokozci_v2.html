                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

                return shuffled;

                const sortedCorr = [...q.correct].sort().join(',');
                return sortedAns === sortedCorr;
            };

                setIsSending(true);
                const score = calculateScore();
                const pct   = (score / questions.length * 100).toFixed(1);
                const grade = pct < 29 ? 5 : pct <= 49 ? 4 : pct <= 79 ? 3 : pct <= 89 ? 2 : 1;
                const fullName = `${studentFirstName} ${studentLastName}`;
                const timeSpent = formatTime(getElapsedTime());

                const completedKey = `quiz_completed_${QUIZ_CONFIG.title}`;
                localStorage.setItem(completedKey, JSON.stringify({ name: fullName, date: new Date().toISOString(), score: `${score}/${questions.length}`, time: timeSpent, windowSwitches }));

                let answersDetails = '';
                questions.forEach((q, i) => {
                    const ans = answers[i];
                    const ok  = q.type === 'checkbox' ? isCheckboxCorrect(q, ans) : ans === q.correct;
                    answersDetails += `${i + 1}. ${q.question}\n`;
                    if (q.type === 'multiple') {
                        answersDetails += `   Student: ${ans !== undefined ? q.options[ans] : 'Bez odpovědi'}\n`;
                        answersDetails += `   Správně: ${q.options[q.correct]}\n`;
                    } else if (q.type === 'boolean') {
                        answersDetails += `   Student: ${ans !== undefined ? (ans ? 'Pravda' : 'Nepravda') : 'Bez odpovědi'}\n`;
                        answersDetails += `   Správně: ${q.correct ? 'Pravda' : 'Nepravda'}\n`;
                    } else if (q.type === 'checkbox') {
                        const selTxts  = Array.isArray(ans) ? ans.map(j => q.options[j]).join(', ') : 'Bez odpovědi';
                        const corrTxts = q.correct.map(j => q.options[j]).join(', ');
                        answersDetails += `   Student: ${selTxts}\n`;
                        answersDetails += `   Správně: ${corrTxts}\n`;
                    }
                    answersDetails += `   Výsledek: ${ok ? '✓ Správně' : '✗ Špatně'}\n\n`;
                });

                try {
                    await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
                        to_email: QUIZ_CONFIG.teacherEmail, student_name: fullName,
                        quiz_title: QUIZ_CONFIG.title, score: `${score}/${questions.length}`,
                        percentage: `${pct}%`, grade, date: new Date().toLocaleDateString('cs-CZ'),
                        time: timeSpent, window_switches: windowSwitches, answers_details: answersDetails
                    });
                    setEmailSent(true);
                    alert('✓ Výsledky byly úspěšně odeslány učiteli!');
                } catch (err) {
                    console.error(err);
                    alert('Nepodařilo se odeslat e-mail. Zkus to prosím znovu nebo kontaktuj učitele.');
                } finally {
                    setIsSending(false);
                }
            };

            // ── KVÍZ DOKONČEN (localStorage) ────────────────────────────────
            if (quizCompleted) {
                const data = JSON.parse(localStorage.getItem(`quiz_completed_${QUIZ_CONFIG.title}`) || '{}');
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                        <div className="max-w-2xl mx-auto bg-white rounded-lg shadow-xl p-8 text-center">
                            <div className="text-6xl mb-4">🔒</div>
                            <h1 className="text-3xl font-bold text-indigo-900 mb-4">Kvíz již byl vyplněn</h1>
                            <p className="text-gray-700 text-lg mb-6">Tento kvíz jsi již dokončil a odeslal učiteli.</p>
                            {data.name && (
                                <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-6 mb-6 text-left">
                                    <p className="text-gray-700 mb-2"><strong>Jméno:</strong> {data.name}</p>
                                    <p className="text-gray-700 mb-2"><strong>Výsledek:</strong> {data.score}</p>
                                    {data.time && <p className="text-gray-700 mb-2"><strong>Čas:</strong> {data.time}</p>}
                                    {data.windowSwitches > 0 && <p className="text-gray-700 mb-2"><strong>Přepnutí oken:</strong> {data.windowSwitches}×</p>}
                                    <p className="text-gray-700"><strong>Datum:</strong> {new Date(data.date).toLocaleString('cs-CZ')}</p>
                                </div>
                            )}
                            <p className="text-gray-600 text-sm">Každý student může kvíz vyplnit pouze jednou. Pokud si myslíš, že je to chyba, kontaktuj svého učitele.</p>
                        </div>
                    </div>
                );
            }

            // ── VÝSLEDKY ─────────────────────────────────────────────────────
            if (showResults) {
                const score = calculateScore();
                const pct   = (score / questions.length * 100).toFixed(1);
                const wasTimeExpired = timeExpiredRef.current;
                const timeSpent = formatTime(getElapsedTime());

                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                        <div className="max-w-3xl mx-auto bg-white rounded-lg shadow-xl p-8">
                            <h1 className="text-3xl font-bold text-center text-indigo-900 mb-6">Výsledky kvízu</h1>

                            <div className={`border-2 rounded-lg p-4 mb-4 text-center ${wasTimeExpired ? 'bg-red-100 border-red-400' : 'bg-blue-100 border-blue-400'}`}>
                                <div className={`text-2xl font-bold ${wasTimeExpired ? 'text-red-800' : 'text-blue-800'}`}>
                                    {wasTimeExpired ? '⏰ Čas vypršel!' : `⏱️ Čas: ${timeSpent}`}
                                </div>
                                {wasTimeExpired && <p className="text-red-700 text-sm mt-2">Nezodpovězených otázek: {questions.length - Object.keys(answers).length}</p>}
                            </div>

                            {windowSwitches > 0 && (
                                <div className="bg-orange-50 border-2 border-orange-400 rounded-lg p-4 mb-6 text-center">
                                    <div className="text-xl font-bold text-orange-800">⚠️ Přepnutí oken: {windowSwitches}×</div>
                                    <p className="text-orange-700 text-sm mt-2">Tato informace bude odeslána učiteli.</p>
                                </div>
                            )}

                            <div className="text-center mb-8">
                                <div className="text-6xl font-bold text-indigo-600 mb-2">{score} / {questions.length}</div>
                                <div className="text-2xl text-gray-700">{pct}%</div>
                                <div className="mt-4 text-lg font-semibold">
                                    {pct < 29 ? <span className="text-red-600">Celkové hodnocení: 5</span>
                                    : pct <= 49 ? <span className="text-orange-600">Celkové hodnocení: 4</span>
                                    : pct <= 79 ? <span className="text-yellow-600">Celkové hodnocení: 3</span>
                                    : pct <= 89 ? <span className="text-blue-600">Celkové hodnocení: 2</span>
                                    : <span className="text-green-600">Celkové hodnocení: 1</span>}
                                </div>
                            </div>

                            {!emailSent && (
                                <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-6 mb-6">
                                    <h2 className="text-lg font-bold text-gray-800 mb-3">📧 Odeslat výsledky učiteli</h2>
                                    <div className="grid grid-cols-2 gap-3 mb-3">
                                        <input type="text" placeholder="Jméno" value={studentFirstName} onChange={e => setStudentFirstName(e.target.value)} disabled={isSending} className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none disabled:bg-gray-100" />
                                        <input type="text" placeholder="Příjmení" value={studentLastName} onChange={e => setStudentLastName(e.target.value)} disabled={isSending} className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none disabled:bg-gray-100" />
                                    </div>
                                    <button onClick={sendResultsEmail} disabled={isSending} className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed">
                                        {isSending ? 'Odesílám...' : 'Odeslat výsledky učiteli'}
                                    </button>
                                </div>
                            )}

                            {emailSent && (
                                <div className="bg-green-50 border-2 border-green-300 rounded-lg p-6 mb-6 text-center">
                                    <div className="text-4xl mb-2">✓</div>
                                    <p className="text-green-800 font-semibold text-lg mb-2">Výsledky byly úspěšně odeslány učiteli!</p>
                                    <p className="text-gray-800 font-bold text-2xl mt-4">Nyní můžeš zavřít prohlížeč.</p>
                                </div>
                            )}

                            <div className="space-y-4">
                                <h2 className="text-xl font-bold text-gray-800 mb-4">Přehled odpovědí:</h2>
                                {questions.map((q, i) => {
                                    const ans = answers[i];
                                    const ok  = q.type === 'checkbox' ? isCheckboxCorrect(q, ans) : ans === q.correct;
                                    return (
                                        <div key={q.id} className={`p-4 rounded-lg border-2 ${ok ? 'bg-green-50 border-green-300' : 'bg-red-50 border-red-300'}`}>
                                            <div className="flex items-start gap-2">
                                                <span className="font-bold text-gray-700">{i + 1}.</span>
                                                <div className="flex-1">
                                                    <p className="text-gray-800 mb-2">{q.question}</p>
                                                    {q.type === 'multiple' && (
                                                        <>
                                                            <p className="text-sm text-gray-600">Tvá odpověď: <span className={ok ? 'text-green-700 font-semibold' : 'text-red-700 font-semibold'}>{ans !== undefined ? q.options[ans] : 'Bez odpovědi'}</span></p>
                                                            {!ok && <p className="text-sm text-green-700 font-semibold">Správná odpověď: {q.options[q.correct]}</p>}
                                                        </>
                                                    )}
                                                    {q.type === 'boolean' && (
                                                        <>
                                                            <p className="text-sm text-gray-600">Tvá odpověď: <span className={ok ? 'text-green-700 font-semibold' : 'text-red-700 font-semibold'}>{ans !== undefined ? (ans ? 'Pravda' : 'Nepravda') : 'Bez odpovědi'}</span></p>
                                                            {!ok && <p className="text-sm text-green-700 font-semibold">Správná odpověď: {q.correct ? 'Pravda' : 'Nepravda'}</p>}
                                                        </>
                                                    )}
                                                    {q.type === 'checkbox' && (
                                                        <>
                                                            <p className="text-sm text-gray-600">Tvá odpověď: <span className={ok ? 'text-green-700 font-semibold' : 'text-red-700 font-semibold'}>{Array.isArray(ans) && ans.length > 0 ? ans.map(j => q.options[j]).join(', ') : 'Bez odpovědi'}</span></p>
                                                            {!ok && <p className="text-sm text-green-700 font-semibold">Správná odpověď: {q.correct.map(j => q.options[j]).join(', ')}</p>}
                                                        </>
                                                    )}
                                                </div>
                                                <span className="text-2xl">{ok ? '✓' : '✗'}</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            // ── HLAVNÍ KVÍZ ─────────────────────────────────────────────────
            const q = questions[currentQuestion];
            const ans = answers[currentQuestion];
            const isAnswered = q.type === 'checkbox'
                ? Array.isArray(ans) && ans.length > 0
                : ans !== undefined;

            const isTimeCritical  = timeLeft <= 120;
            const isTimeVeryLow   = timeLeft <= 60;
            const timerColor      = isTimeVeryLow ? 'bg-red-100 border-red-500' : isTimeCritical ? 'bg-orange-100 border-orange-400' : 'bg-blue-100 border-blue-400';
            const timerTextColor  = isTimeVeryLow ? 'text-red-800' : isTimeCritical ? 'text-orange-800' : 'text-blue-800';

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                    <div className="max-w-3xl mx-auto bg-white rounded-lg shadow-xl p-8">
                        <div className="mb-6">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-2xl font-bold text-indigo-900">Kvíz: {QUIZ_CONFIG.title}</h1>
                                <span className="text-gray-600 font-semibold">{currentQuestion + 1} / {questions.length}</span>
                            </div>
                            <div className={`border-2 rounded-lg p-3 mb-4 text-center ${timerColor}`}>
                                <div className={`text-xl font-bold ${timerTextColor}`}>
                                    {isTimeVeryLow ? '🔴' : isTimeCritical ? '⚠️' : '⏰'} Zbývající čas: {formatTime(timeLeft)}
                                </div>
                                {isTimeCritical && <p className={`text-sm mt-1 ${timerTextColor}`}>{isTimeVeryLow ? 'Čas téměř vypršel!' : 'Pozor, zbývá málo času!'}</p>}
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-2">
                                <div className="bg-indigo-600 h-2 rounded-full transition-all duration-300" style={{ width: `${((currentQuestion + 1) / questions.length) * 100}%` }} />
                            </div>
                        </div>

                        <div className="mb-8">
                            <h2 className="text-xl text-gray-800 mb-6 leading-relaxed">{q.question}</h2>

                            {/* BOOLEAN */}
                            {q.type === 'boolean' && (
                                <div className="space-y-3">
                                    {[true, false].map(val => (
                                        <button key={String(val)} onClick={() => handleAnswer(val)}
                                            className={`w-full text-left p-4 rounded-lg border-2 transition ${ans === val ? 'border-indigo-600 bg-indigo-50' : 'border-gray-300 hover:border-indigo-400 hover:bg-gray-50'}`}>
                                            <span className="font-semibold text-gray-700">{val ? 'Pravda' : 'Nepravda'}</span>
                                        </button>
                                    ))}
                                </div>
                            )}

                            {/* MULTIPLE CHOICE */}
                            {q.type === 'multiple' && (
                                <div className="space-y-3">
                                    {q.options.map((option, i) => (
                                        <button key={i} onClick={() => handleAnswer(i)}
                                            className={`w-full text-left p-4 rounded-lg border-2 transition ${ans === i ? 'border-indigo-600 bg-indigo-50' : 'border-gray-300 hover:border-indigo-400 hover:bg-gray-50'}`}>
                                            <span className="font-semibold text-gray-700">{String.fromCharCode(65 + i)}.</span> {option}
                                        </button>
                                    ))}
                                </div>
                            )}

                            {/* CHECKBOX */}
                            {q.type === 'checkbox' && (
                                <div className="space-y-3">
                                    <p className="text-sm text-orange-600 font-medium mb-1">Vyber všechny správné odpovědi:</p>
                                    {q.options.map((option, i) => {
                                        const sel = Array.isArray(ans) && ans.includes(i);
                                        return (
                                            <button key={i} onClick={() => handleCheckbox(i)}
                                                className={`w-full text-left p-4 rounded-lg border-2 transition ${sel ? 'border-orange-500 bg-orange-50' : 'border-gray-300 hover:border-orange-400 hover:bg-gray-50'}`}>
                                                <span className={`font-semibold mr-2 ${sel ? 'text-orange-600' : 'text-gray-500'}`}>{sel ? '☑' : '☐'}</span>{option}
                                            </button>
                                        );
                                    })}
                                </div>
                            )}
                        </div>

                        <div className="flex gap-4">
                            <button onClick={handlePrevious} disabled={currentQuestion === 0}
                                className="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-400 transition disabled:opacity-50 disabled:cursor-not-allowed">
                                ← Zpět
                            </button>
                            <button onClick={handleNext} disabled={!isAnswered}
                                className="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                                {currentQuestion === questions.length - 1 ? 'Dokončit' : 'Další →'}
                            </button>
                        </div>

                        {!isAnswered && (
                            <p className="text-center text-gray-500 text-sm mt-4">
                                {q.type === 'checkbox' ? 'Vyber alespoň jednu odpověď pro pokračování' : 'Pro pokračování vyber odpověď'}
                            </p>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MuscleQuiz />);
    </script>
</body>
</html>
