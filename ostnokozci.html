            const shuffleArray = (array) => {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            };

                        const optionsWithIndex = q.options.map((opt, idx) => ({ text: opt, originalIndex: idx }));
                        const shuffledOptions = shuffleArray(optionsWithIndex);
                        return {
                            ...q,
                            options: shuffledOptions.map(o => o.text),
                            correct: shuffledOptions.findIndex(o => o.originalIndex === q.correct)

                    return q;

            useEffect(() => {

                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    const remaining = totalTimeLimit - elapsed;
                    
                    if (remaining <= 0 && !timeExpiredRef.current) {
                        timeExpiredRef.current = true;
                        setTimeLeft(0);
                        setShowResults(true);
                    } else {
                        setTimeLeft(Math.max(0, remaining));
                    }
                }, 1000);

                return () => clearInterval(timer);
            }, [startTime, totalTimeLimit, showResults, quizCompleted]);

            useEffect(() => {

                const handleVisibilityChange = () => {
                    if (document.hidden) {
                        setWindowSwitches(prev => prev + 1);
                    }
                };

                const handleBlur = () => {
                    setWindowSwitches(prev => prev + 1);
                };

                document.addEventListener('visibilitychange', handleVisibilityChange);
                window.addEventListener('blur', handleBlur);

                return () => {

                };
            }, [showResults, quizCompleted]);

                const preventContextMenu = (e) => e.preventDefault();

                document.addEventListener('copy', preventCopy);
                document.addEventListener('cut', preventCopy);
                document.addEventListener('contextmenu', preventContextMenu);

                return () => {

            const calculateScore = () => {
                let score = 0;
                questions.forEach((q, index) => {
                    if (q.type === 'boolean') {
                        if (answers[index] === q.correct) score++;
                    } else if (q.type === 'multiple') {
                        if (answers[index] === q.correct) score++;
                    }
                });
                return score;
            };

            const sendResultsEmail = async () => {
                if (!studentFirstName.trim() || !studentLastName.trim()) {
                    alert('Prosím vyplň své jméno i příjmení.');
                    return;
                }

                if (EMAILJS_CONFIG.publicKey === "DOPLŇ-SEM-PUBLIC-KEY") {
                    alert('EmailJS není správně nakonfigurován. Zkontroluj EMAILJS_CONFIG v kódu.');
                    return;
                }

                setIsSending(true);

                const score = calculateScore();
                const percentage = (score / questions.length * 100).toFixed(1);
                const grade = percentage < 29 ? 5 : percentage <= 49 ? 4 : percentage <= 79 ? 3 : percentage <= 89 ? 2 : 1;
                const fullName = `${studentFirstName} ${studentLastName}`;
                const elapsedSeconds = getElapsedTime();
                const timeSpent = formatTime(elapsedSeconds);
                
                // NEJDŘÍVE označit kvíz jako dokončený
                const completedKey = `quiz_completed_${QUIZ_CONFIG.title}`;
                const completionData = {
                    name: fullName,
                    date: new Date().toISOString(),
                    score: `${score}/${questions.length}`,
                    time: timeSpent,
                    windowSwitches: windowSwitches
                };
                localStorage.setItem(completedKey, JSON.stringify(completionData));
                
                // Vytvoření přehledu odpovědí
                let answersDetails = '';
                questions.forEach((q, index) => {
                    const userAnswer = answers[index];
                    const isCorrect = q.type === 'boolean' 
                        ? userAnswer === q.correct 
                        : userAnswer === q.correct;
                    
                    answersDetails += `${index + 1}. ${q.question}\n`;
                    
                    if (q.type === 'multiple') {
                        answersDetails += `   Odpověď studenta: ${userAnswer !== undefined ? q.options[userAnswer] : 'Bez odpovědi'}\n`;
                        answersDetails += `   Správná odpověď: ${q.options[q.correct]}\n`;
                    } else if (q.type === 'boolean') {
                        answersDetails += `   Odpověď studenta: ${userAnswer !== undefined ? (userAnswer ? 'Pravda' : 'Nepravda') : 'Bez odpovědi'}\n`;
                        answersDetails += `   Správná odpověď: ${q.correct ? 'Pravda' : 'Nepravda'}\n`;
                    }
                    
                    answersDetails += `   Výsledek: ${isCorrect ? '✓ Správně' : '✗ Špatně'}\n\n`;
                });

                const templateParams = {
                    to_email: QUIZ_CONFIG.teacherEmail,
                    student_name: fullName,
                    quiz_title: QUIZ_CONFIG.title,
                    score: `${score}/${questions.length}`,
                    percentage: `${percentage}%`,
                    grade: grade,
                    date: new Date().toLocaleDateString('cs-CZ'),
                    time: timeSpent,
                    window_switches: windowSwitches, // 🔍 Počet přepnutí oken
                    answers_details: answersDetails
                };

                try {
                    await emailjs.send(
                        EMAILJS_CONFIG.serviceId,
                        EMAILJS_CONFIG.templateId,
                        templateParams
                    );
                    
                    setEmailSent(true);
                    alert('✓ Výsledky byly úspěšně odeslány učiteli!');
                } catch (error) {
                    console.error('Chyba při odesílání e-mailu:', error);
                    alert('Nepodařilo se odeslat e-mail. Zkus to prosím znovu nebo kontaktuj učitele.');
                } finally {
                    setIsSending(false);
                }
            };

            // Zobrazení hlášky, když už byl kvíz vyplněn
            if (quizCompleted) {
                const completedKey = `quiz_completed_${QUIZ_CONFIG.title}`;
                const completionData = JSON.parse(localStorage.getItem(completedKey) || '{}');
                
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                        <div className="max-w-2xl mx-auto bg-white rounded-lg shadow-xl p-8">
                            <div className="text-center">
                                <div className="text-6xl mb-4">🔒</div>
                                <h1 className="text-3xl font-bold text-indigo-900 mb-4">
                                    Kvíz již byl vyplněn
                                </h1>
                                <p className="text-gray-700 text-lg mb-6">
                                    Tento kvíz jsi již dokončil a odeslal učiteli.
                                </p>
                                {completionData.name && (
                                    <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-6 mb-6">
                                        <p className="text-gray-700 mb-2">
                                            <strong>Jméno:</strong> {completionData.name}
                                        </p>
                                        <p className="text-gray-700 mb-2">
                                            <strong>Výsledek:</strong> {completionData.score}
                                        </p>
                                        {completionData.time && (
                                            <p className="text-gray-700 mb-2">
                                                <strong>Čas:</strong> {completionData.time}
                                            </p>
                                        )}
                                        {completionData.windowSwitches !== undefined && completionData.windowSwitches > 0 && (
                                            <p className="text-gray-700 mb-2">
                                                <strong>Přepnutí oken:</strong> {completionData.windowSwitches}×
                                            </p>
                                        )}
                                        <p className="text-gray-700">
                                            <strong>Datum:</strong> {new Date(completionData.date).toLocaleString('cs-CZ')}
                                        </p>
                                    </div>
                                )}
                                <p className="text-gray-600 text-sm">
                                    Každý student může kvíz vyplnit pouze jednou. Pokud si myslíš, že je to chyba, kontaktuj svého učitele.
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            if (showResults) {
                const score = calculateScore();
                const percentage = (score / questions.length * 100).toFixed(1);
                const elapsedSeconds = getElapsedTime();
                const timeSpent = formatTime(elapsedSeconds);
                const wasTimeExpired = timeExpiredRef.current;
                
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                        <div className="max-w-3xl mx-auto bg-white rounded-lg shadow-xl p-8">
                            <h1 className="text-3xl font-bold text-center text-indigo-900 mb-6">
                                Výsledky kvízu
                            </h1>
                            
                            {/* ⏱️ ZOBRAZENÍ ČASU */}
                            <div className={`border-2 rounded-lg p-4 mb-4 text-center ${wasTimeExpired ? 'bg-red-100 border-red-400' : 'bg-blue-100 border-blue-400'}`}>
                                <div className={`text-2xl font-bold ${wasTimeExpired ? 'text-red-800' : 'text-blue-800'}`}>
                                    {wasTimeExpired ? '⏰ Čas vypršel!' : `⏱️ Čas: ${timeSpent}`}
                                </div>
                                {wasTimeExpired && (() => {
                                    const unansweredCount = questions.length - Object.keys(answers).length;
                                    return (
                                        <p className="text-red-700 text-sm mt-2">
                                            Kvíz byl automaticky ukončen po {formatTime(totalTimeLimit)}. Nevyplněné otázky jsou hodnoceny 0 body.
                                            <br />
                                            <strong>Nezodpovězených otázek: {unansweredCount}</strong>
                                        </p>
                                    );
                                })()}
                            </div>

                            {/* 🔍 ZOBRAZENÍ PŘEPNUTÍ OKEN */}
                            {windowSwitches > 0 && (
                                <div className="bg-orange-50 border-2 border-orange-400 rounded-lg p-4 mb-6 text-center">
                                    <div className="text-xl font-bold text-orange-800">
                                        ⚠️ Přepnutí oken: {windowSwitches}×
                                    </div>
                                    <p className="text-orange-700 text-sm mt-2">
                                        Během kvízu jsi {windowSwitches}× přepnul na jinou záložku nebo okno. Tato informace bude odeslána učiteli.
                                    </p>
                                </div>
                            )}
                            
                            <div className="text-center mb-8">
                                <div className="text-6xl font-bold text-indigo-600 mb-2">
                                    {score} / {questions.length}
                                </div>
                                <div className="text-2xl text-gray-700">
                                    {percentage}%
                                </div>
                                <div className="mt-4 text-lg font-semibold">
                                    {percentage < 29 ? (
                                        <span className="text-red-600">Celkové hodnocení: 5</span>
                                    ) : percentage <= 49 ? (
                                        <span className="text-orange-600">Celkové hodnocení: 4</span>
                                    ) : percentage <= 79 ? (
                                        <span className="text-yellow-600">Celkové hodnocení: 3</span>
                                    ) : percentage <= 89 ? (
                                        <span className="text-blue-600">Celkové hodnocení: 2</span>
                                    ) : (
                                        <span className="text-green-600">Celkové hodnocení: 1</span>
                                    )}
                                </div>
                            </div>

                            {!emailSent && (
                                <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-6 mb-6">
                                    <h2 className="text-lg font-bold text-gray-800 mb-3">📧 Odeslat výsledky učiteli</h2>
                                    <p className="text-gray-600 text-sm mb-4">
                                        {wasTimeExpired 
                                            ? 'Čas vypršel. Pro odeslání výsledků vyplň své jméno a příjmení.'
                                            : 'Vyplň své jméno a příjmení. Výsledky budou automaticky odeslány učiteli.'
                                        }
                                    </p>
                                    <div className="grid grid-cols-2 gap-3 mb-3">
                                        <input
                                            type="text"
                                            placeholder="Jméno"
                                            value={studentFirstName}
                                            onChange={(e) => setStudentFirstName(e.target.value)}
                                            disabled={isSending}
                                            className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none disabled:bg-gray-100"
                                        />
                                        <input
                                            type="text"
                                            placeholder="Příjmení"
                                            value={studentLastName}
                                            onChange={(e) => setStudentLastName(e.target.value)}
                                            disabled={isSending}
                                            className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none disabled:bg-gray-100"
                                        />
                                    </div>
                                    <button
                                        onClick={() => sendResultsEmail()}
                                        disabled={isSending}
                                        className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed"
                                    >
                                        {isSending ? 'Odesílám...' : 'Odeslat výsledky učiteli'}
                                    </button>
                                </div>
                            )}

                            {emailSent && (
                                <div className="bg-green-50 border-2 border-green-300 rounded-lg p-6 mb-6 text-center">
                                    <div className="text-4xl mb-2">✓</div>
                                    <p className="text-green-800 font-semibold text-lg mb-2">
                                        Výsledky byly úspěšně odeslány učiteli!
                                    </p>
                                    <p className="text-gray-800 font-bold text-2xl mt-4">
                                        Nyní můžeš zavřít prohlížeč.
                                    </p>
                                </div>
                            )}

                            <div className="space-y-4">
                                <h2 className="text-xl font-bold text-gray-800 mb-4">Přehled odpovědí:</h2>
                                {questions.map((q, index) => {
                                    const userAnswer = answers[index];
                                    const isCorrect = q.type === 'boolean' 
                                        ? userAnswer === q.correct 
                                        : userAnswer === q.correct;
                                    
                                    return (
                                        <div key={q.id} className={`p-4 rounded-lg border-2 ${isCorrect ? 'bg-green-50 border-green-300' : 'bg-red-50 border-red-300'}`}>
                                            <div className="flex items-start gap-2">
                                                <span className="font-bold text-gray-700">{index + 1}.</span>
                                                <div className="flex-1">
                                                    <p className="text-gray-800 mb-2">{q.question}</p>
                                                    {q.type === 'multiple' && (
                                                        <>
                                                            <p className="text-sm text-gray-600">
                                                                Tvá odpověď: <span className={isCorrect ? 'text-green-700 font-semibold' : 'text-red-700 font-semibold'}>
                                                                    {userAnswer !== undefined ? q.options[userAnswer] : 'Bez odpovědi'}
                                                                </span>
                                                            </p>
                                                            {!isCorrect && (
                                                                <p className="text-sm text-green-700 font-semibold">
                                                                    Správná odpověď: {q.options[q.correct]}
                                                                </p>
                                                            )}
                                                        </>
                                                    )}
                                                    {q.type === 'boolean' && (
                                                        <>
                                                            <p className="text-sm text-gray-600">
                                                                Tvá odpověď: <span className={isCorrect ? 'text-green-700 font-semibold' : 'text-red-700 font-semibold'}>
                                                                    {userAnswer !== undefined ? (userAnswer ? 'Pravda' : 'Nepravda') : 'Bez odpovědi'}
                                                                </span>
                                                            </p>
                                                            {!isCorrect && (
                                                                <p className="text-sm text-green-700 font-semibold">
                                                                    Správná odpověď: {q.correct ? 'Pravda' : 'Nepravda'}
                                                                </p>
                                                            )}
                                                        </>
                                                    )}
                                                </div>
                                                <span className="text-2xl">
                                                    {isCorrect ? '✓' : '✗'}
                                                </span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            const q = questions[currentQuestion];
            const isAnswered = answers[currentQuestion] !== undefined;
            
            // Výpočet barev podle zbývajícího času
            const isTimeCritical = timeLeft <= 120; // 2 minuty nebo méně
            const isTimeVeryLow = timeLeft <= 60; // 1 minuta nebo méně
            
            const timerColor = isTimeVeryLow 
                ? 'bg-red-100 border-red-500' 
                : isTimeCritical 
                    ? 'bg-orange-100 border-orange-400' 
                    : 'bg-blue-100 border-blue-400';
                    
            const timerTextColor = isTimeVeryLow 
                ? 'text-red-800' 
                : isTimeCritical 
                    ? 'text-orange-800' 
                    : 'text-blue-800';

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                    <div className="max-w-3xl mx-auto bg-white rounded-lg shadow-xl p-8">
                        <div className="mb-6">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-2xl font-bold text-indigo-900">
                                    Kvíz: {QUIZ_CONFIG.title}
                                </h1>
                                <span className="text-gray-600 font-semibold">
                                    {currentQuestion + 1} / {questions.length}
                                </span>
                            </div>
                            
                            {/* ⏱️ ZOBRAZENÍ ČASOVAČE */}
                            <div className={`border-2 rounded-lg p-3 mb-4 text-center ${timerColor}`}>
                                <div className={`text-xl font-bold ${timerTextColor}`}>
                                    {isTimeVeryLow ? '🔴' : isTimeCritical ? '⚠️' : '⏰'} Zbývající čas: {formatTime(timeLeft)}
                                </div>
                                {isTimeCritical && (
                                    <p className={`text-sm mt-1 ${timerTextColor}`}>
                                        {isTimeVeryLow ? 'Čas téměř vypršel!' : 'Pozor, zbývá málo času!'}
                                    </p>
                                )}
                            </div>
                            
                            <div className="w-full bg-gray-200 rounded-full h-2">
                                <div 
                                    className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                                    style={{ width: `${((currentQuestion + 1) / questions.length) * 100}%` }}
                                />
                            </div>
                        </div>

                        <div className="mb-8">
                            <h2 className="text-xl text-gray-800 mb-6 leading-relaxed">
                                {q.question}
                            </h2>

                            {q.type === 'multiple' && (
                                <div className="space-y-3">
                                    {q.options.map((option, index) => (
                                        <button
                                            key={index}
                                            onClick={() => handleAnswer(index)}
                                            className={`w-full text-left p-4 rounded-lg border-2 transition ${
                                                answers[currentQuestion] === index
                                                    ? 'border-indigo-600 bg-indigo-50'
                                                    : 'border-gray-300 hover:border-indigo-400 hover:bg-gray-50'
                                            }`}
                                        >
                                            <span className="font-semibold text-gray-700">{String.fromCharCode(65 + index)}.</span> {option}
                                        </button>
                                    ))}
                                </div>
                            )}

                            {q.type === 'boolean' && (
                                <div className="space-y-3">
                                    <button
                                        onClick={() => handleAnswer(true)}
                                        className={`w-full text-left p-4 rounded-lg border-2 transition ${
                                            answers[currentQuestion] === true
                                                ? 'border-indigo-600 bg-indigo-50'
                                                : 'border-gray-300 hover:border-indigo-400 hover:bg-gray-50'
                                        }`}
                                    >
                                        <span className="font-semibold text-gray-700">Pravda</span>
                                    </button>
                                    <button
                                        onClick={() => handleAnswer(false)}
                                        className={`w-full text-left p-4 rounded-lg border-2 transition ${
                                            answers[currentQuestion] === false
                                                ? 'border-indigo-600 bg-indigo-50'
                                                : 'border-gray-300 hover:border-indigo-400 hover:bg-gray-50'
                                        }`}
                                    >
                                        <span className="font-semibold text-gray-700">Nepravda</span>
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="flex gap-4">
                            <button
                                onClick={handlePrevious}
                                disabled={currentQuestion === 0}
                                className="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-400 transition disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                ← Zpět
                            </button>
                            <button
                                onClick={handleNext}
                                disabled={!isAnswered}
                                className="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                {currentQuestion === questions.length - 1 ? 'Dokončit' : 'Další →'}
                            </button>
                        </div>

                        {!isAnswered && (
                            <p className="text-center text-gray-500 text-sm mt-4">
                                Pro pokračování vyber odpověď
                            </p>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MuscleQuiz />);
    </script>
</body>
</html>
